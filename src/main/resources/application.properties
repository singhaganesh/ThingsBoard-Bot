spring.application.name=ThingsBoard-Bot
server.port=8080

spring.profiles.active=dev

# ===== Database (H2 in-memory for production without MySQL) =====
# Default: H2 in-memory database (no setup needed)
# To use MySQL: set spring.datasource.url to MySQL URL and provide DB_USER, DB_PASSWORD
spring.datasource.url=jdbc:h2:mem:thingsboard_bot_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ===== Cache =====
spring.cache.type=simple
spring.cache.cache-names=device-data,critical-data

# ===== ThingsBoard =====
iotchatbot.thingsboard.url=${TB_URL:https://thingsboard.cloud}
iotchatbot.thingsboard.username=${TB_USER:user@example.com}
iotchatbot.thingsboard.password=${TB_PASSWORD:password}
iotchatbot.thingsboard.device-id=${DEVICE_ID:your-device-id}
iotchatbot.thingsboard.timeout=30000
iotchatbot.thingsboard.cache-ttl-seconds=60

# ===== OpenAI =====
iotchatbot.openai.api-key=${OPENAI_API_KEY:your-openai-api-key}
iotchatbot.openai.model=gpt-4o-mini
iotchatbot.openai.max-tokens=1000
iotchatbot.openai.temperature=0.7
iotchatbot.openai.timeout=30000

# ===== Chatbot =====
iotchatbot.chatbot.max-context-tokens=6000
iotchatbot.chatbot.enable-alerts=true
iotchatbot.chatbot.alert-poll-interval=10000

# ===== Actuator =====
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always

# ===== Logging =====
logging.level.root=INFO
logging.level.com.seple.ThingsBoard_Bot=DEBUG
